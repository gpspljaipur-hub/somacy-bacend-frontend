$kind: http-request
url: "{{base_url}}/api/cart/set"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: order_id
      value: ""
    - type: text
      key: items
      value: ""
    - type: text
      key: medicine_id
      value: ""
    - type: text
      key: num_strips
      value: ""
    - type: text
      key: quantity
      value: ""
order: 1000
