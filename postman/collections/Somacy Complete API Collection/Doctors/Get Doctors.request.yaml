$kind: http-request
url: "{{base_url}}/api/doctors/list"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: page
      value: "1"
    - type: text
      key: limit
      value: "10"
    - type: text
      key: search
      value: ""
    - type: text
      key: specialization
      value: ""
    - type: text
      key: experience
      value: ""
    - type: text
      key: is_rghs
      value: ""
    - type: text
      key: consultation_mode
      value: ""
order: 2000
