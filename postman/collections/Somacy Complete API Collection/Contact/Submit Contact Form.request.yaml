$kind: http-request
url: "{{base_url}}/api/contact/submit"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: full_name
      value: John Doe
    - type: text
      key: contact_number
      value: "9876543210"
    - type: text
      key: email_address
      value: john@mail.com
    - type: text
      key: message
      value: I need help
order: 1000
