$kind: http-request
url: "{{base_url}}/api/user-cart/add"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: user_id
      value: ""
    - type: text
      key: item_id
      value: ""
    - type: text
      key: item_type
      value: ""
    - type: text
      key: item_name
      value: ""
    - type: text
      key: price
      value: ""
order: 1000
