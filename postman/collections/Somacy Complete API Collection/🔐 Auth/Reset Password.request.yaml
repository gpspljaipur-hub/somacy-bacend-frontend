$kind: http-request
url: "{{base_url}}/api/auth/reset-password"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: email
      value: ""
    - type: text
      key: otp
      value: ""
    - type: text
      key: new_password
      value: ""
    - type: text
      key: confirm_password
      value: ""
order: 4000
