$kind: http-request
url: "{{base_url}}/api/coupons/update"
method: PUT
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: id
      value: ""
    - type: text
      key: coupon_code
      value: ""
    - type: text
      key: coupon_title
      value: ""
    - type: text
      key: coupon_description
      value: ""
    - type: text
      key: expiry_date
      value: ""
    - type: text
      key: min_order_amount
      value: ""
    - type: text
      key: discount
      value: ""
    - type: text
      key: status
      value: ""
    - type: file
      key: coupon_image
      src:
        - ""
order: 3000
