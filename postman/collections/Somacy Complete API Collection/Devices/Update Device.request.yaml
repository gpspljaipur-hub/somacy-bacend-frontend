$kind: http-request
url: "{{base_url}}/api/devices/update"
method: PUT
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: id
      value: "1"
    - type: text
      key: device_name
      value: BP Monitor
    - type: text
      key: price
      value: "1500"
    - type: text
      key: discount
      value: "10"
    - type: text
      key: status
      value: "1"
    - type: file
      key: device_image
      src:
        - ""
order: 3000
