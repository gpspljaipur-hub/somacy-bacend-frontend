$kind: http-request
url: "{{base_url}}/api/video-tutorials/update"
method: PUT
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: id
      value: "1"
    - type: text
      key: title
      value: How to order medicine
    - type: text
      key: subtitle
      value: Updated guide
    - type: text
      key: video_link
      value: https://youtube.com/watch?v=xyz
    - type: text
      key: duration
      value: 6:00
    - type: text
      key: status
      value: "1"
    - type: file
      key: thumbnail
      src:
        - ""
order: 3000
