$kind: http-request
url: "{{base_url}}/api/coupons/add"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: coupon_code
      value: SAVE10
    - type: text
      key: coupon_title
      value: Save 10%
    - type: text
      key: coupon_description
      value: Get 10% off
    - type: text
      key: expiry_date
      value: 2026-12-31
    - type: text
      key: min_order_amount
      value: "200"
    - type: text
      key: discount
      value: "10"
    - type: text
      key: status
      value: "1"
    - type: file
      key: coupon_image
      src:
        - ""
order: 1000
