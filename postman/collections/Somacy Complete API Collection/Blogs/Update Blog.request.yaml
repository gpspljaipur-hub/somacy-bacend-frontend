$kind: http-request
url: "{{base_url}}/api/blogs/update"
method: PUT
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: id
      value: "1"
    - type: text
      key: title
      value: Health Tips
    - type: text
      key: description
      value: Short desc
    - type: text
      key: content
      value: <p>Updated content</p>
    - type: text
      key: category
      value: Health
    - type: text
      key: status
      value: "2"
    - type: file
      key: image
      src:
        - ""
order: 4000
