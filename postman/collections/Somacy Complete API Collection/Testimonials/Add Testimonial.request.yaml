$kind: http-request
url: "{{base_url}}/api/testimonials/add"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: name
      value: Amit Shah
    - type: text
      key: designation
      value: Patient
    - type: text
      key: content
      value: Great service!
    - type: text
      key: status
      value: "1"
    - type: file
      key: image
      src:
        - ""
order: 2000
