$kind: http-request
url: "{{base_url}}/api/delivery-boys/add"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: name
      value: Ravi Kumar
    - type: text
      key: mobile
      value: "9876543210"
    - type: text
      key: email
      value: ravi@mail.com
    - type: text
      key: commission_percentage
      value: "5"
    - type: text
      key: address
      value: Jaipur
    - type: text
      key: status
      value: "1"
order: 1000
