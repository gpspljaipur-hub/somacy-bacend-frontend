$kind: http-request
url: "{{base_url}}/api/user-address/add"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: user_id
      value: "1"
    - type: text
      key: address_line
      value: 123 Street
    - type: text
      key: city
      value: Jaipur
    - type: text
      key: state
      value: Rajasthan
    - type: text
      key: pincode
      value: "302001"
    - type: text
      key: is_default
      value: "false"
order: 1000
