$kind: http-request
url: "{{base_url}}/api/brands/add"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: brand_name
      value: Cipla
    - type: text
      key: is_popular
      value: "true"
    - type: text
      key: status
      value: "1"
    - type: file
      key: brand_image
      src:
        - ""
order: 1000
