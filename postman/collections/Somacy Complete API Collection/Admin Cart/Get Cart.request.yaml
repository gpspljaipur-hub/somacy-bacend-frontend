$kind: http-request
url: "{{base_url}}/api/cart/list"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: order_id
      value: "1"
    - type: text
      key: page
      value: "1"
    - type: text
      key: limit
      value: "20"
order: 3000
