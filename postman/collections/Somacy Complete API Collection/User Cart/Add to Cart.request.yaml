$kind: http-request
url: "{{base_url}}/api/user-cart/add"
method: POST
headers:
  Authorization: Bearer {{token}}
body:
  type: formdata
  content:
    - type: text
      key: user_id
      value: "1"
    - type: text
      key: item_id
      value: "1"
    - type: text
      key: item_type
      value: medicine
    - type: text
      key: item_name
      value: Paracetamol
    - type: text
      key: price
      value: "50"
order: 1000
