$kind: http-request
url: "{{baseUrl}}/appointments/book"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: doctor_id
      value: "1"
    - type: text
      key: user_id
      value: "1"
    - type: text
      key: patient_name
      value: Patient
    - type: text
      key: patient_id
      value: ""
      description: RGHS ID if any
    - type: text
      key: consultation_mode
      value: Video
    - type: text
      key: appointment_date
      value: 2026-03-24
    - type: text
      key: appointment_time
      value: 10:30:00
    - type: text
      key: fee
      value: "800"
    - type: text
      key: total_payable
      value: "800"
    - type: text
      key: rghs_benefit_applied
      value: "false"
order: 1000
