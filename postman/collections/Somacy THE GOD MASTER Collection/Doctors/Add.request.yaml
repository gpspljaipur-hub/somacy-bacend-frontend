$kind: http-request
url: "{{baseUrl}}/doctors/add"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: name
      value: Dr. Smith
    - type: text
      key: specialization
      value: Cardiology
    - type: text
      key: experience_years
      value: "10"
    - type: text
      key: consultation_fee
      value: "800"
    - type: text
      key: location
      value: Delhi
    - type: text
      key: about
      value: ...
    - type: text
      key: is_rghs_empanelled
      value: "true"
    - type: text
      key: status
      value: "1"
    - type: file
      key: image
      src:
        - ""
order: 1000
