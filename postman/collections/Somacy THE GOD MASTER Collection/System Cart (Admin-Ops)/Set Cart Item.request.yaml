$kind: http-request
url: "{{baseUrl}}/cart/set"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: order_id
      value: "1"
    - type: text
      key: medicine_id
      value: "1"
    - type: text
      key: num_strips
      value: "1"
    - type: text
      key: quantity
      value: ""
    - type: text
      key: items
      value: "[]"
      description: JSON array of items
order: 1000
