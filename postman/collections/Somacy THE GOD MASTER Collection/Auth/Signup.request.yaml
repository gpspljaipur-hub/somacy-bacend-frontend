$kind: http-request
url: "{{baseUrl}}/auth/signup"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: first_name
      value: John
    - type: text
      key: last_name
      value: Doe
    - type: text
      key: email
      value: john@doe.com
    - type: text
      key: password
      value: pass123
    - type: text
      key: mobile_no
      value: "1234567890"
order: 2000
