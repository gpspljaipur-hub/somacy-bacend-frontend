$kind: http-request
url: "{{baseUrl}}/auth/update"
method: PUT
body:
  type: formdata
  content:
    - type: text
      key: name
      value: John Doe
    - type: text
      key: email
      value: john@doe.com
    - type: text
      key: mobile
      value: "1234567890"
    - type: text
      key: role
      value: user
