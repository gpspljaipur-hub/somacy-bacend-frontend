$kind: http-request
url: "{{baseUrl}}/auth/reset-password"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: email
      value: john@doe.com
    - type: text
      key: otp
      value: ""
    - type: text
      key: new_password
      value: ""
    - type: text
      key: confirm_password
      value: ""
order: 4000
