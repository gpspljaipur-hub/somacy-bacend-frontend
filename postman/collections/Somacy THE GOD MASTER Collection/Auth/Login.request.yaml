$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: identifier
      value: test@somacy.com
    - type: text
      key: password
      value: pass123
scripts:
  - type: afterResponse
    code: var jsonData = pm.response.json(); if(jsonData.token)
      pm.globals.set('token', jsonData.token);
order: 1000
