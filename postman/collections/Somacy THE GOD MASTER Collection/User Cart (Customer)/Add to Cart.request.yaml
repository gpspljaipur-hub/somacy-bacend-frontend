$kind: http-request
url: "{{baseUrl}}/user-cart/add"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: user_id
      value: "1"
    - type: text
      key: item_id
      value: "1"
    - type: text
      key: item_type
      value: medicine
    - type: text
      key: item_name
      value: ""
    - type: text
      key: price
      value: "100"
    - type: text
      key: quantity
      value: "1"
order: 1000
