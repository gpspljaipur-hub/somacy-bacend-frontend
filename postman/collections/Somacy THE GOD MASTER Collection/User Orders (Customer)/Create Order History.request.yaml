$kind: http-request
url: "{{baseUrl}}/user-order/add"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: user_id
      value: "1"
    - type: text
      key: items
      value: "[]"
    - type: text
      key: order_name
      value: ""
    - type: text
      key: order_type
      value: medicine
    - type: text
      key: delivery_date
      value: 2026-03-22
    - type: text
      key: beneficiary_name
      value: ""
    - type: text
      key: delivery_address
      value: ""
    - type: text
      key: total_items
      value: "1"
    - type: text
      key: total_amount
      value: "500"
    - type: text
      key: total_mrp
      value: "500"
    - type: text
      key: status
      value: pending
    - type: file
      key: image
      src:
        - ""
order: 1000
